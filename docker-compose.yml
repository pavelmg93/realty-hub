  app-postgres:
    image: ankane/pgvector:latest
    environment:
      POSTGRES_DB: ${APP_DB_NAME:-re_nhatrang}
      POSTGRES_USER: ${APP_DB_USER:-re_nhatrang}
      POSTGRES_PASSWORD: ${APP_DB_PASSWORD:-change_me_in_production}
    ports:
      - "${APP_DB_PORT:-5432}:5432"
    volumes:
      - app-pg-data:/var/lib/postgresql/data
      - ./src/db/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${APP_DB_USER:-re_nhatrang}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - re-nhatrang

  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@renhatrang.dev}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    volumes:
      - ./config/pgadmin-servers.json:/pgadmin4/servers.json:ro
    depends_on:
      app-postgres:
        condition: service_healthy
    networks:
      - re-nhatrang
    restart: unless-stopped

  web:
    build: ./web
    ports:
      - "${WEB_PORT:-8888}:3000"
    environment:
      DATABASE_URL: postgresql://${APP_DB_USER:-re_nhatrang}:${APP_DB_PASSWORD:-change_me_in_production}@app-postgres:5432/${APP_DB_NAME:-re_nhatrang}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      NEXT_PUBLIC_APP_NAME: Realty Hub
      UPLOAD_DIR: /app/uploads
      GEMINI_API_KEY: ${ENV_GEMINI_API_KEY:-}
    volumes:
      - ./uploads:/app/uploads
      - ./src:/src:ro
    depends_on:
      app-postgres:
        condition: service_healthy
    networks:
      - re-nhatrang

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - re-nhatrang

volumes:
  # kestra-data:
  # kestra-pg-data:
  app-pg-data:
    name: realty-hub-pg-data
  redis-data:
    name: realty-hub-redis-data
  uploads-data:
    name: realty-hub-uploads-data

networks:
  re-nhatrang:
    driver: bridge
