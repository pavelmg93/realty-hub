id: parse-listings
namespace: re-nhatrang

description: |
  Parse pending raw listings into structured data.
  Reads raw_listings with status='pending', extracts fields using Vietnamese
  regex parser, and stores results in parsed_listings.
  Optionally filter by batch_id.

inputs:
  - id: batch_id
    type: STRING
    required: false
    description: Optional batch_id to filter which listings to parse. Leave empty to parse all pending.

tasks:
  - id: parse_raw_listings
    type: io.kestra.plugin.scripts.python.Script
    containerImage: python:3.12-slim
    taskRunner:
      type: io.kestra.plugin.scripts.runner.docker.Docker
      networkMode: re-nhatrang_re-nhatrang
    warningOnStdErr: false
    beforeCommands:
      - pip install psycopg2-binary sqlalchemy
    script: |
      import hashlib
      import os
      import re
      import sys

      from sqlalchemy import create_engine, text

      # Database connection
      db_host = "app-postgres"
      db_port = "5432"
      db_name = os.environ.get("APP_DB_NAME", "re_nhatrang")
      db_user = os.environ.get("APP_DB_USER", "re_nhatrang")
      db_password = os.environ.get("APP_DB_PASSWORD", "change_me_in_production")
      db_url = f"postgresql://{db_user}:{db_password}@{db_host}:{db_port}/{db_name}"

      batch_id = "{{ inputs.batch_id }}" or None
      if batch_id == "":
          batch_id = None

      # --- Vietnamese parser (inline for Kestra script task) ---

      PROPERTY_TYPES = {
          "nha": ["nhà mặt tiền", "nhà phố", "nhà cấp 4", "nhà", "nha"],
          "dat": ["đất nền", "lô đất", "đất", "dat", "lo dat"],
          "can_ho": ["căn hộ", "chung cư", "can ho", "chung cu"],
          "phong_tro": ["phòng trọ", "nhà trọ", "phong tro", "nha tro"],
          "biet_thu": ["biệt thự", "biet thu"],
          "khach_san": ["khách sạn", "khach san"],
          "mat_bang": ["mặt bằng", "mat bang"],
      }

      _PROPERTY_KEYWORD_MAP = {}
      for ptype, keywords in PROPERTY_TYPES.items():
          for kw in sorted(keywords, key=len, reverse=True):
              _PROPERTY_KEYWORD_MAP[kw] = ptype

      _LAND_OVERRIDE_PATTERNS = re.compile(
          r"(?:bán đất tặng nhà|ban dat tang nha|đất.*tặng nhà|dat.*tang nha)",
          re.IGNORECASE,
      )

      SELL_KEYWORDS = ["bán", "ban", "cần bán", "can ban", "bán gấp", "ban gap", "bán nhanh", "sang nhượng", "sang nhuong"]
      RENT_KEYWORDS = ["cho thuê", "cho thue", "cần thuê", "can thue", "thuê", "thue"]

      PRICE_PATTERN = re.compile(r"(\d+[.,]?\d*)\s*(tỷ|ty|tỉ|ti|triệu|trieu|tr|t)\b", re.IGNORECASE)
      AREA_DIRECT = re.compile(r"(\d+[.,]?\d*)\s*m[2²]", re.IGNORECASE)
      AREA_DIM = re.compile(r"(\d+[.,]?\d*)\s*[xX×]\s*(\d+[.,]?\d*)")
      WARD_PAT = re.compile(r"(?:phường|phuong|p\.)\s*([\w\s]+?)(?:,|\.|$|\s*[-;])", re.IGNORECASE)
      STREET_PAT = re.compile(r"(?:đường|duong|đ\.)\s*([\w\s]+?)(?:,|\.|$|\s*[-;])", re.IGNORECASE)
      DISTRICT_PAT = re.compile(r"(?:quận|quan|q\.)\s*([\w\s]+?)(?:,|\.|$|\s*[-;])", re.IGNORECASE)
      BEDROOM_PAT = re.compile(r"(\d+)\s*(?:phòng ngủ|phong ngu|pn)\b", re.IGNORECASE)
      FLOOR_PAT = re.compile(r"(\d+)\s*(?:tầng|tang|lầu|lau)\b", re.IGNORECASE)
      FRONTAGE_PAT = re.compile(r"(?:(?:mặt tiền|mat tien|mt|ngang)\s*(\d+[.,]?\d*)\s*m|(\d+[.,]?\d*)\s*m\s*(?:mặt tiền|mat tien|mt|ngang))\b", re.IGNORECASE)

      # Access road patterns
      ACCESS_ROAD_PATTERNS = [
          (re.compile(r"mặt (?:tiền )?đường|mat (?:tien )?duong|mặt phố|mat pho", re.IGNORECASE), "mat_duong"),
          (re.compile(r"hẻm ô tô\s*(?:rộng\s*)?(\d+[.,]?\d*)\s*m|hem o to\s*(?:rong\s*)?(\d+[.,]?\d*)\s*m", re.IGNORECASE), "hem_oto"),
          (re.compile(r"hẻm ô tô|hem o to|đường ô tô|duong o to|ô tô (?:đỗ|ra vào|quay đầu|vào)", re.IGNORECASE), "hem_oto"),
          (re.compile(r"hẻm thông|hem thong", re.IGNORECASE), "hem_thong"),
          (re.compile(r"hẻm rộng|hem rong", re.IGNORECASE), "hem_rong"),
          (re.compile(r"hẻm (?:xe máy|2[–-]?3m|nhỏ)|hem (?:xe may|nho)", re.IGNORECASE), "hem_nho"),
          (re.compile(r"hẻm|hem\b", re.IGNORECASE), "hem"),
      ]

      FURNISHED_PATTERNS = [
          (re.compile(r"full nội thất|full noi that|nội thất đầy đủ|noi that day du|đầy đủ nội thất|nội thất đẹp|noi that dep|nội thất xịn", re.IGNORECASE), "full"),
          (re.compile(r"nội thất cơ bản|noi that co ban", re.IGNORECASE), "co_ban"),
          (re.compile(r"nhà trống|nha trong|chưa có nội thất", re.IGNORECASE), "khong"),
      ]

      NHA_TRANG_WARDS = [
          "Vĩnh Hòa", "Vĩnh Hải", "Vĩnh Phước", "Vĩnh Thọ",
          "Vạn Thạnh", "Phương Sài", "Ngọc Hiệp", "Phước Hòa",
          "Tân Tiến", "Phước Hải", "Lộc Thọ", "Vĩnh Nguyên",
          "Vĩnh Trường", "Phước Long",
          "Phương Sơn", "Xương Huân", "Vạn Thắng",
          "Phước Tiến", "Phước Tân", "Tân Lập",
          "Vĩnh Lương", "Vĩnh Phương", "Vĩnh Ngọc",
          "Vĩnh Thạnh", "Vĩnh Trung", "Vĩnh Hiệp",
          "Vĩnh Thái", "Phước Đồng",
      ]

      def norm_num(s):
          return float(s.replace(",", "."))

      def extract_property_type(text_input):
          text_lower = text_input.lower()
          if _LAND_OVERRIDE_PATTERNS.search(text_lower):
              return "dat"
          type_scores = {}
          for kw, pt in _PROPERTY_KEYWORD_MAP.items():
              if kw in text_lower:
                  type_scores[pt] = type_scores.get(pt, 0) + 1
          if not type_scores:
              return None
          if len(type_scores) == 1:
              return next(iter(type_scores))
          first_line = text_lower.split("\n")[0]
          for kw, pt in _PROPERTY_KEYWORD_MAP.items():
              if kw in first_line:
                  return pt
          return max(type_scores, key=lambda k: type_scores[k])

      def extract_access_road(text_input):
          for pattern, access_type in ACCESS_ROAD_PATTERNS:
              if pattern.search(text_input):
                  return access_type
          return None

      def extract_furnished(text_input):
          for pattern, status in FURNISHED_PATTERNS:
              if pattern.search(text_input):
                  return status
          return None

      def parse_listing(text):
          errors = []
          result = {}

          # Property type
          result["property_type"] = extract_property_type(text)

          # Price
          m = PRICE_PATTERN.search(text)
          if m:
              result["price_raw"] = m.group(0)
              num = norm_num(m.group(1))
              unit = m.group(2).lower()
              if unit in ("tỷ", "ty", "tỉ", "ti", "t"):
                  result["price_vnd"] = int(num * 1_000_000_000)
              elif unit in ("triệu", "trieu", "tr"):
                  result["price_vnd"] = int(num * 1_000_000)
              else:
                  result["price_vnd"] = int(num)
          else:
              result["price_raw"] = None
              result["price_vnd"] = None

          # Area
          m = AREA_DIRECT.search(text)
          if m:
              result["area_m2"] = norm_num(m.group(1))
          else:
              m = AREA_DIM.search(text)
              if m:
                  result["area_m2"] = round(norm_num(m.group(1)) * norm_num(m.group(2)), 2)
              else:
                  result["area_m2"] = None

          # Location
          text_lower = text.lower()
          result["ward"] = None
          result["street"] = None
          result["district"] = None

          m = WARD_PAT.search(text)
          if m:
              result["ward"] = m.group(1).strip()
          m = STREET_PAT.search(text)
          if m:
              result["street"] = m.group(1).strip()
          m = DISTRICT_PAT.search(text)
          if m:
              result["district"] = m.group(1).strip()

          if not result["ward"]:
              for w in NHA_TRANG_WARDS:
                  if w.lower() in text_lower:
                      result["ward"] = w
                      break

          parts = [v for v in [result["street"], result["ward"], result["district"]] if v]
          result["address_raw"] = ", ".join(parts) if parts else None

          # Bedrooms
          m = BEDROOM_PAT.search(text)
          result["num_bedrooms"] = int(m.group(1)) if m else None

          # Floors
          m = FLOOR_PAT.search(text)
          result["num_floors"] = int(m.group(1)) if m else None

          # Frontage
          m = FRONTAGE_PAT.search(text)
          if m:
              val = m.group(1) or m.group(2)
              result["frontage_m"] = norm_num(val) if val else None
          else:
              result["frontage_m"] = None

          # Access road and furnished
          result["access_road"] = extract_access_road(text)
          result["furnished"] = extract_furnished(text)

          result["description"] = text.strip()

          # Transaction type — default to "ban" if listing has property info
          result["transaction_type"] = None
          for kw in SELL_KEYWORDS:
              if kw in text_lower:
                  result["transaction_type"] = "ban"
                  break
          if not result["transaction_type"]:
              for kw in RENT_KEYWORDS:
                  if kw in text_lower:
                      result["transaction_type"] = "cho_thue"
                      break
          if not result["transaction_type"]:
              has_info = any([result["property_type"], result["price_vnd"], result["area_m2"]])
              if has_info:
                  result["transaction_type"] = "ban"

          # Confidence
          checks = [result["property_type"], result["transaction_type"], result["price_vnd"], result["area_m2"], result["ward"] or result["street"]]
          result["confidence"] = round(sum(1 for c in checks if c is not None) / len(checks), 2)

          if not result["property_type"]:
              errors.append("Could not determine property type")
          if not result["transaction_type"]:
              errors.append("Could not determine transaction type")
          if not result["price_vnd"]:
              errors.append("Could not extract price")

          result["parse_errors"] = "; ".join(errors) if errors else None
          return result

      def compute_listing_hash(parsed):
          """Compute MD5 dedup key from the most distinguishing parsed fields."""
          parts = [
              parsed.get("property_type") or "",
              str(parsed["price_vnd"]) if parsed.get("price_vnd") is not None else "",
              str(parsed["area_m2"]) if parsed.get("area_m2") is not None else "",
              parsed.get("ward") or "",
              parsed.get("street") or "",
              str(parsed["num_bedrooms"]) if parsed.get("num_bedrooms") is not None else "",
              str(parsed["num_floors"]) if parsed.get("num_floors") is not None else "",
          ]
          return hashlib.md5("".join(parts).encode()).hexdigest()

      # --- Main execution ---

      engine = create_engine(db_url)
      counts = {"parsed": 0, "failed": 0, "skipped": 0, "total": 0}

      with engine.begin() as conn:
          query = "SELECT id, message_text, message_date FROM raw_listings WHERE status = 'pending'"
          params = {}
          if batch_id:
              query += " AND batch_id = :batch_id"
              params["batch_id"] = batch_id

          rows = conn.execute(text(query), params).fetchall()
          counts["total"] = len(rows)

          for row in rows:
              raw_id, message_text, message_date = row[0], row[1], row[2]
              try:
                  parsed = parse_listing(message_text)
                  listing_hash = compute_listing_hash(parsed)

                  result = conn.execute(
                      text(
                          "INSERT INTO parsed_listings "
                          "(raw_listing_id, listing_hash, message_date, "
                          "property_type, transaction_type, "
                          "price_raw, price_vnd, area_m2, address_raw, ward, street, "
                          "district, num_bedrooms, num_floors, frontage_m, "
                          "access_road, furnished, "
                          "description, confidence, parse_errors) "
                          "VALUES (:raw_listing_id, :listing_hash, :message_date, "
                          ":property_type, :transaction_type, "
                          ":price_raw, :price_vnd, :area_m2, :address_raw, :ward, :street, "
                          ":district, :num_bedrooms, :num_floors, :frontage_m, "
                          ":access_road, :furnished, "
                          ":description, :confidence, :parse_errors) "
                          "ON CONFLICT (listing_hash) DO NOTHING"
                      ),
                      {"raw_listing_id": raw_id, "listing_hash": listing_hash,
                       "message_date": message_date, **parsed},
                  )

                  if result.rowcount == 0:
                      # Duplicate detected — skip
                      conn.execute(
                          text("UPDATE raw_listings SET status = 'skipped' WHERE id = :id"),
                          {"id": raw_id},
                      )
                      counts["skipped"] += 1
                  else:
                      new_status = "parsed" if parsed["confidence"] > 0 else "failed"
                      conn.execute(
                          text("UPDATE raw_listings SET status = :status WHERE id = :id"),
                          {"status": new_status, "id": raw_id},
                      )
                      if new_status == "parsed":
                          counts["parsed"] += 1
                      else:
                          counts["failed"] += 1

              except Exception as e:
                  conn.execute(
                      text("UPDATE raw_listings SET status = 'failed' WHERE id = :id"),
                      {"id": raw_id},
                  )
                  counts["failed"] += 1
                  print(f"Error parsing listing {raw_id}: {e}", file=sys.stderr)

      print(f"Parse complete: {counts['parsed']} parsed, {counts['failed']} failed, {counts['skipped']} skipped, {counts['total']} total")
    env:
      APP_DB_NAME: "{{ envs.APP_DB_NAME ?? 're_nhatrang' }}"
      APP_DB_USER: "{{ envs.APP_DB_USER ?? 're_nhatrang' }}"
      APP_DB_PASSWORD: "{{ envs.APP_DB_PASSWORD ?? 'change_me_in_production' }}"
